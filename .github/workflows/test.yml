name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Run ci-summary tests
        run: node --test scripts/ci-summary.test.js
      - name: Run start-services tests
        run: bash scripts/start-services.test.sh

  lint:
    name: Lint Workflows
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install actionlint
        run: bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
      - name: Lint workflows
        run: ./actionlint -shellcheck=""

  security:
    name: Security Scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install zizmor
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sL https://github.com/woodruffw/zizmor/releases/latest/download/zizmor-x86_64-unknown-linux-gnu.tar.gz \
            | tar xz -C "$HOME/.local/bin/"
      - name: Run zizmor
        run: $HOME/.local/bin/zizmor -c .zizmor.yml --min-severity medium --min-confidence medium .

  # Integration tests: run the exact same commands used in ci.yml
  # against the test fixture to catch CLI flag mismatches early
  integration:
    name: Integration Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: ./
        with:
          otp-version: '28'

      # --- Compile (mirrors ci.yml compile job) ---
      - name: Compile fixture
        working-directory: test/fixtures
        run: rebar3 compile

      # --- Format (mirrors ci.yml fmt job) ---
      - name: Format check
        working-directory: test/fixtures
        run: rebar3 fmt --check

      # --- Xref (mirrors ci.yml xref job) ---
      - name: Xref
        working-directory: test/fixtures
        run: rebar3 xref

      # --- Dialyzer (mirrors ci.yml dialyzer job) ---
      - name: Dialyzer
        working-directory: test/fixtures
        run: rebar3 dialyzer

      # --- EUnit (mirrors ci.yml eunit job) ---
      - name: EUnit
        working-directory: test/fixtures
        run: rebar3 eunit

      # --- Common Test (mirrors ci.yml ct job) ---
      - name: Common Test
        working-directory: test/fixtures
        run: rebar3 ct

      # --- Audit (mirrors ci.yml audit job command) ---
      - name: Audit
        working-directory: test/fixtures
        run: rebar3 audit --format json --level low

      # --- SBOM (mirrors ci.yml sbom job command) ---
      - name: SBOM generate
        working-directory: test/fixtures
        run: |
          rebar3 sbom --output bom.xml --force
          test -f bom.xml || { echo "bom.xml not generated"; exit 1; }

      # --- Documentation (mirrors ci.yml ex-doc job) ---
      - name: Documentation
        working-directory: test/fixtures
        run: rebar3 ex_doc
