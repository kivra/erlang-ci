name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Run audit-summary tests
        run: node --test scripts/audit-summary.test.js
      - name: Run start-services tests
        run: bash scripts/start-services.test.sh

  lint:
    name: Lint Workflows
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install actionlint
        run: bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
      - name: Lint workflows
        run: ./actionlint -shellcheck=""

  security:
    name: Security Scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install zizmor
        run: |
          curl -sL https://github.com/woodruffw/zizmor/releases/latest/download/zizmor-x86_64-unknown-linux-gnu.tar.gz \
            | tar xz -C /usr/local/bin/
      - name: Run zizmor
        run: zizmor --min-severity medium --min-confidence medium .

  self-test:
    name: Self Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: ./
        with:
          otp-version: '28'
      - name: Compile fixture
        working-directory: test/fixtures
        run: rebar3 compile
      - name: Format check
        working-directory: test/fixtures
        run: rebar3 fmt --check
      - name: Xref
        working-directory: test/fixtures
        run: rebar3 xref
      - name: Dialyzer
        working-directory: test/fixtures
        run: rebar3 dialyzer
      - name: EUnit
        working-directory: test/fixtures
        run: rebar3 eunit
