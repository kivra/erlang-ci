name: Release

on:
  workflow_call:
    inputs:
      cliff-config:
        description: 'Path to cliff.toml config file'
        type: string
        required: false
        default: 'cliff.toml'
      floating-major-tag:
        description: 'Update floating major version tag (e.g. v1) to track latest release'
        type: boolean
        required: false
        default: false

jobs:
  release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Determine next version
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            echo "No existing tags — initial release as v0.1.0"
            echo "next=v0.1.0" >> "$GITHUB_OUTPUT"
            echo "initial=true" >> "$GITHUB_OUTPUT"
          else
            echo "latest=$LATEST_TAG" >> "$GITHUB_OUTPUT"
            echo "initial=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Calculate bumped version
        if: steps.version.outputs.initial == 'false'
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4
        id: bump
        with:
          config: ${{ inputs.cliff-config }}
          args: --bumped-version

      - name: Check if version changed
        if: steps.version.outputs.initial == 'false'
        id: check
        env:
          BUMP_CONTENT: ${{ steps.bump.outputs.content }}
          LATEST: ${{ steps.version.outputs.latest }}
        run: |
          NEXT=$(echo "$BUMP_CONTENT" | tr -d '[:space:]')
          if [ "$NEXT" = "$LATEST" ] || [ -z "$NEXT" ]; then
            echo "No version bump needed"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Bumping from $LATEST to $NEXT"
            echo "next=$NEXT" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve version
        id: resolve
        env:
          IS_INITIAL: ${{ steps.version.outputs.initial }}
          INITIAL_NEXT: ${{ steps.version.outputs.next }}
          CHECK_NEXT: ${{ steps.check.outputs.next }}
          CHECK_SKIP: ${{ steps.check.outputs.skip }}
        run: |
          if [ "$IS_INITIAL" = "true" ]; then
            echo "next=$INITIAL_NEXT" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "next=$CHECK_NEXT" >> "$GITHUB_OUTPUT"
            echo "skip=$CHECK_SKIP" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate changelog
        if: steps.resolve.outputs.skip == 'false'
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4
        id: changelog
        with:
          config: ${{ inputs.cliff-config }}
          args: --unreleased --strip header --tag ${{ steps.resolve.outputs.next }}

      - name: Create tag and release
        if: steps.resolve.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGELOG: ${{ steps.changelog.outputs.content }}
          TAG: ${{ steps.resolve.outputs.next }}
        run: |
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "$CHANGELOG"

      - name: Update floating major tag
        if: steps.resolve.outputs.skip == 'false' && inputs.floating-major-tag
        env:
          TAG: ${{ steps.resolve.outputs.next }}
        run: |
          MAJOR=$(echo "$TAG" | grep -oP '^v\d+')
          echo "Updating floating tag $MAJOR -> $TAG"
          git tag -f "$MAJOR" "$TAG"
          git push origin "$MAJOR" --force
