name: Erlang CI

on:
  workflow_call:
    inputs:
      otp-version:
        description: 'Erlang/OTP version (e.g. "28.0"). Ignored if version-file is set.'
        type: string
        required: false
        default: '28'
      rebar3-version:
        description: 'Rebar3 version'
        type: string
        required: false
        default: '3'
      version-file:
        description: 'Read versions from file (.tool-versions or mise.toml)'
        type: string
        required: false
        default: ''
      version-type:
        description: 'Version match type (strict or loose). Defaults to strict when version-file is set.'
        type: string
        required: false
        default: ''
      otp-matrix:
        description: 'JSON array of OTP versions for matrix testing (e.g. ''["27","28"]''). Tests run on all, dialyzer on latest only.'
        type: string
        required: false
        default: ''

      # Steps to enable/disable
      enable-fmt:
        description: 'Run rebar3 fmt --check'
        type: boolean
        required: false
        default: true
      enable-xref:
        description: 'Run rebar3 xref'
        type: boolean
        required: false
        default: true
      enable-dialyzer:
        description: 'Run rebar3 dialyzer'
        type: boolean
        required: false
        default: true
      enable-eunit:
        description: 'Run rebar3 eunit'
        type: boolean
        required: false
        default: true
      enable-ct:
        description: 'Run rebar3 ct'
        type: boolean
        required: false
        default: false
      enable-ex-doc:
        description: 'Run rebar3 ex_doc'
        type: boolean
        required: false
        default: false
      enable-audit:
        description: 'Run rebar3 audit (requires rebar3_audit plugin)'
        type: boolean
        required: false
        default: false
      audit-level:
        description: 'Minimum severity to fail on (critical, high, medium, low)'
        type: string
        required: false
        default: 'low'
      enable-coverage:
        description: 'Enable code coverage (--cover flag + covertool)'
        type: boolean
        required: false
        default: false
      enable-sbom:
        description: 'Generate CycloneDX SBOM (requires rebar3_sbom plugin)'
        type: boolean
        required: false
        default: false
      enable-sbom-scan:
        description: 'Scan SBOM for vulnerabilities using Grype (requires enable-sbom)'
        type: boolean
        required: false
        default: false
      enable-dependency-submission:
        description: 'Submit dependencies to GitHub Dependency Graph'
        type: boolean
        required: false
        default: false

      # Database
      postgres:
        description: 'Enable PostgreSQL service container'
        type: boolean
        required: false
        default: false
      postgres-version:
        description: 'PostgreSQL version'
        type: string
        required: false
        default: '17'
      postgres-db:
        description: 'PostgreSQL database name'
        type: string
        required: false
        default: 'test_db'
      postgres-user:
        description: 'PostgreSQL username'
        type: string
        required: false
        default: 'postgres'
      postgres-password:
        description: 'PostgreSQL password'
        type: string
        required: false
        default: 'postgres'
      postgres-port:
        description: 'PostgreSQL port'
        type: string
        required: false
        default: '5432'

      # Kafka
      kafka:
        description: 'Enable Kafka service container'
        type: boolean
        required: false
        default: false
      kafka-version:
        description: 'Kafka Docker image version (uses apache/kafka)'
        type: string
        required: false
        default: '3.9'
      kafka-port:
        description: 'Kafka broker port'
        type: string
        required: false
        default: '9092'

      # Summary
      enable-summary:
        description: 'Post a status summary comment on PRs'
        type: boolean
        required: false
        default: true

      # Extra
      ct-config:
        description: 'Path to CT sys.config file (passed as --sys_config)'
        type: string
        required: false
        default: ''
      rebar3-compile-args:
        description: 'Extra args for rebar3 compile'
        type: string
        required: false
        default: ''
      eunit-args:
        description: 'Extra args for rebar3 eunit (e.g. --module=foo_tests,bar_tests)'
        type: string
        required: false
        default: ''
      ct-args:
        description: 'Extra args for rebar3 ct'
        type: string
        required: false
        default: ''

jobs:
  compile:
    name: Compile
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: Taure/erlang-ci@v1
        id: setup
        with:
          otp-version: ${{ inputs.otp-version }}
          rebar3-version: ${{ inputs.rebar3-version }}
          version-file: ${{ inputs.version-file }}
          version-type: ${{ inputs.version-type }}
      - name: Compile
        env:
          COMPILE_ARGS: ${{ inputs.rebar3-compile-args }}
        run: rebar3 compile $COMPILE_ARGS
      - name: Check for uncommitted artifacts
        run: git diff --exit-code

  fmt:
    name: Format
    needs: compile
    if: ${{ inputs.enable-fmt }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: Taure/erlang-ci@v1
        with:
          otp-version: ${{ inputs.otp-version }}
          rebar3-version: ${{ inputs.rebar3-version }}
          version-file: ${{ inputs.version-file }}
          version-type: ${{ inputs.version-type }}
      - run: rebar3 fmt --check

  xref:
    name: Xref
    needs: compile
    if: ${{ inputs.enable-xref }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: Taure/erlang-ci@v1
        with:
          otp-version: ${{ inputs.otp-version }}
          rebar3-version: ${{ inputs.rebar3-version }}
          version-file: ${{ inputs.version-file }}
          version-type: ${{ inputs.version-type }}
      - run: rebar3 xref

  dialyzer:
    name: Dialyzer
    needs: compile
    if: ${{ inputs.enable-dialyzer }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: Taure/erlang-ci@v1
        with:
          otp-version: ${{ inputs.otp-version }}
          rebar3-version: ${{ inputs.rebar3-version }}
          version-file: ${{ inputs.version-file }}
          version-type: ${{ inputs.version-type }}
      - name: Restore PLT cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: _build/default/*_plt*
          key: erlang-ci-plt-${{ runner.os }}-otp-${{ inputs.otp-version }}-${{ hashFiles('rebar.lock') }}
          restore-keys: |
            erlang-ci-plt-${{ runner.os }}-otp-${{ inputs.otp-version }}-
      - run: rebar3 dialyzer

  audit:
    name: Audit
    needs: compile
    if: ${{ inputs.enable-audit }}
    runs-on: ubuntu-24.04
    outputs:
      json: ${{ steps.audit.outputs.json }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: Taure/erlang-ci@v1
        with:
          otp-version: ${{ inputs.otp-version }}
          rebar3-version: ${{ inputs.rebar3-version }}
          version-file: ${{ inputs.version-file }}
          version-type: ${{ inputs.version-type }}
      - name: Run audit
        id: audit
        env:
          AUDIT_LEVEL: ${{ inputs.audit-level }}
        run: |
          output=$(rebar3 audit --format json --level "$AUDIT_LEVEL" 2>&1)
          rc=$?
          # When no vulns, rebar3_audit outputs human text regardless of format flag
          # When vulns exist, JSON is written to stdout via io:put_chars
          json_line=$(echo "$output" | grep '^\s*{' | head -1)
          if [ -n "$json_line" ]; then
            echo "json<<AUDIT_EOF" >> "$GITHUB_OUTPUT"
            echo "$json_line" >> "$GITHUB_OUTPUT"
            echo "AUDIT_EOF" >> "$GITHUB_OUTPUT"
          else
            # No JSON means no vulnerabilities — build a synthetic response
            dep_count=$(echo "$output" | grep -oP '\d+ dependencies' | grep -oP '\d+' || echo "0")
            echo "json<<AUDIT_EOF" >> "$GITHUB_OUTPUT"
            echo "{\"vulnerabilities\":[],\"dependencies_scanned\":${dep_count}}" >> "$GITHUB_OUTPUT"
            echo "AUDIT_EOF" >> "$GITHUB_OUTPUT"
          fi
          exit $rc

  eunit:
    name: EUnit${{ matrix.otp && format(' (OTP {0})', matrix.otp) || '' }}
    needs: compile
    if: ${{ inputs.enable-eunit }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        otp: ${{ fromJSON(inputs.otp-matrix || format('["{0}"]', inputs.otp-version)) }}
    env:
      PGHOST: ${{ inputs.postgres && 'localhost' || '' }}
      PGPORT: ${{ inputs.postgres-port }}
      PGUSER: ${{ inputs.postgres-user }}
      PGPASSWORD: ${{ inputs.postgres-password }}
      PGDATABASE: ${{ inputs.postgres-db }}
      KAFKA_HOST: ${{ inputs.kafka && 'localhost' || '' }}
      KAFKA_PORT: ${{ inputs.kafka-port }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: Taure/erlang-ci@v1
        with:
          otp-version: ${{ matrix.otp }}
          rebar3-version: ${{ inputs.rebar3-version }}
      - name: Start services
        if: ${{ inputs.postgres || inputs.kafka }}
        env:
          ENABLE_POSTGRES: ${{ inputs.postgres }}
          POSTGRES_VERSION: ${{ inputs.postgres-version }}
          ENABLE_KAFKA: ${{ inputs.kafka }}
          KAFKA_VERSION: ${{ inputs.kafka-version }}
        run: curl -sL https://raw.githubusercontent.com/Taure/erlang-ci/v1/scripts/start-services.sh | bash
      - name: EUnit
        env:
          EUNIT_ARGS: ${{ inputs.eunit-args }}
          COVER_FLAG: ${{ inputs.enable-coverage && '--cover' || '' }}
        run: rebar3 eunit $EUNIT_ARGS $COVER_FLAG
      - name: Generate coverage
        if: ${{ inputs.enable-coverage }}
        run: rebar3 covertool generate
      - name: Upload coverage
        if: ${{ inputs.enable-coverage }}
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          files: _build/test/covertool/*.covertool.xml
          flags: eunit

  ct:
    name: Common Test${{ matrix.otp && format(' (OTP {0})', matrix.otp) || '' }}
    needs: compile
    if: ${{ inputs.enable-ct }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        otp: ${{ fromJSON(inputs.otp-matrix || format('["{0}"]', inputs.otp-version)) }}
    env:
      PGHOST: ${{ inputs.postgres && 'localhost' || '' }}
      PGPORT: ${{ inputs.postgres-port }}
      PGUSER: ${{ inputs.postgres-user }}
      PGPASSWORD: ${{ inputs.postgres-password }}
      PGDATABASE: ${{ inputs.postgres-db }}
      KAFKA_HOST: ${{ inputs.kafka && 'localhost' || '' }}
      KAFKA_PORT: ${{ inputs.kafka-port }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: Taure/erlang-ci@v1
        with:
          otp-version: ${{ matrix.otp }}
          rebar3-version: ${{ inputs.rebar3-version }}
      - name: Start services
        if: ${{ inputs.postgres || inputs.kafka }}
        env:
          ENABLE_POSTGRES: ${{ inputs.postgres }}
          POSTGRES_VERSION: ${{ inputs.postgres-version }}
          ENABLE_KAFKA: ${{ inputs.kafka }}
          KAFKA_VERSION: ${{ inputs.kafka-version }}
        run: curl -sL https://raw.githubusercontent.com/Taure/erlang-ci/v1/scripts/start-services.sh | bash
      - name: Common Test
        env:
          CT_ARGS: ${{ inputs.ct-args }}
          CT_CONFIG: ${{ inputs.ct-config && format('--sys_config {0}', inputs.ct-config) || '' }}
          COVER_FLAG: ${{ inputs.enable-coverage && '--cover' || '' }}
        run: rebar3 ct $CT_ARGS $CT_CONFIG $COVER_FLAG
      - name: Generate coverage
        if: ${{ inputs.enable-coverage }}
        run: rebar3 covertool generate
      - name: Upload coverage
        if: ${{ inputs.enable-coverage }}
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          files: _build/test/covertool/*.covertool.xml
          flags: ct

  sbom:
    name: SBOM
    needs: compile
    if: ${{ inputs.enable-sbom }}
    runs-on: ubuntu-24.04
    outputs:
      scan-json: ${{ steps.scan-extract.outputs.json }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: Taure/erlang-ci@v1
        with:
          otp-version: ${{ inputs.otp-version }}
          rebar3-version: ${{ inputs.rebar3-version }}
          version-file: ${{ inputs.version-file }}
          version-type: ${{ inputs.version-type }}
      - name: Generate SBOM
        run: rebar3 sbom --output bom.xml --force
      - name: Scan SBOM for vulnerabilities
        if: ${{ inputs.enable-sbom-scan }}
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # master
        with:
          scan-type: sbom
          scan-ref: bom.xml
          format: json
          output: trivy-results.json
          severity: HIGH,CRITICAL
          exit-code: '1'
          trivyignores: .trivyignore
      - name: Extract scan results
        if: ${{ inputs.enable-sbom-scan }}
        id: scan-extract
        run: |
          if [ ! -f trivy-results.json ]; then exit 0; fi
          echo "json<<SCAN_EOF" >> "$GITHUB_OUTPUT"
          jq -c '{vulnerabilities: [.Results[]?.Vulnerabilities[]? | {id: .VulnerabilityID, severity: .Severity, package: .PkgName, version: .InstalledVersion, fixed_version: (.FixedVersion // ""), url: (.PrimaryURL // "")}]}' trivy-results.json >> "$GITHUB_OUTPUT"
          echo "SCAN_EOF" >> "$GITHUB_OUTPUT"
      - name: Upload SBOM
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom
          path: bom.xml
      - name: Fail if vulnerabilities found
        if: ${{ steps.trivy.outcome == 'failure' }}
        run: exit 1

  dependency-submission:
    name: Dependency Submission
    needs: compile
    if: ${{ inputs.enable-dependency-submission }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: erlef/rebar3-dependency-submission@c1870bc7ba79a756cb0bc9749256685e612b737c # main

  ex-doc:
    name: Documentation
    needs: compile
    if: ${{ inputs.enable-ex-doc }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: Taure/erlang-ci@v1
        with:
          otp-version: ${{ inputs.otp-version }}
          rebar3-version: ${{ inputs.rebar3-version }}
          version-file: ${{ inputs.version-file }}
          version-type: ${{ inputs.version-type }}
      - run: rebar3 ex_doc

  summary:
    name: Summary
    if: ${{ always() && inputs.enable-summary && github.event_name == 'pull_request' }}
    needs: [audit, sbom]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: Taure/erlang-ci
          ref: v1
          sparse-checkout: scripts
          persist-credentials: false
      - name: Post summary comment
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          AUDIT_JSON: ${{ needs.audit.outputs.json }}
          SBOM_JSON: ${{ needs.sbom.outputs.scan-json }}
        with:
          script: |
            const { renderSummary } = require('./scripts/ci-summary');
            const body = renderSummary({
              audit: process.env.AUDIT_JSON,
              sbom: process.env.SBOM_JSON,
            });
            if (!body) return;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.body && c.body.includes('<!-- erlang-ci-summary -->')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
