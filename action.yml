name: 'Erlang Setup'
description: 'Setup Erlang/OTP, rebar3, and restore build caches'
author: 'novaframework'

branding:
  icon: 'box'
  color: 'red'

inputs:
  otp-version:
    description: 'Erlang/OTP version to install'
    required: false
    default: ''
  rebar3-version:
    description: 'Rebar3 version to install'
    required: false
    default: '3'
  version-file:
    description: 'File to read versions from (.tool-versions or mise.toml)'
    required: false
    default: ''
  version-type:
    description: 'Version match type (strict or loose). Defaults to strict when version-file is set.'
    required: false
    default: ''
  cache-key-prefix:
    description: 'Custom cache key prefix'
    required: false
    default: 'erlang-ci'
  ssh-key:
    description: 'SSH private key for accessing private dependencies'
    required: false
    default: ''

outputs:
  otp-version:
    description: 'Installed OTP version'
    value: ${{ steps.setup-beam.outputs.otp-version }}
  rebar3-version:
    description: 'Installed rebar3 version'
    value: ${{ steps.setup-beam.outputs.rebar3-version }}
  cache-hit:
    description: 'Whether build cache was hit'
    value: ${{ steps.build-cache.outputs.cache-hit }}

runs:
  using: 'composite'
  steps:
    - name: Configure SSH key
      if: ${{ inputs.ssh-key != '' }}
      shell: bash
      env:
        SSH_KEY: ${{ inputs.ssh-key }}
      run: |
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        echo "$SSH_KEY" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan -t rsa,ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
        eval "$(ssh-agent -s)"
        ssh-add ~/.ssh/id_ed25519
        echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"

    - name: Detect .tool-versions
      id: detect-versions
      shell: bash
      env:
        INPUT_VERSION_FILE: ${{ inputs.version-file }}
        INPUT_OTP_VERSION: ${{ inputs.otp-version }}
        INPUT_REBAR3_VERSION: ${{ inputs.rebar3-version }}
        INPUT_VERSION_TYPE: ${{ inputs.version-type }}
      run: bash "${{ github.action_path }}/scripts/detect-versions.sh"

    - name: Setup Erlang/OTP & rebar3
      id: setup-beam
      uses: erlef/setup-beam@0a75ccf1c18916f948584bdc83392d72e26f58f7 # v1
      with:
        otp-version: ${{ steps.detect-versions.outputs.otp-version }}
        rebar3-version: ${{ steps.detect-versions.outputs.rebar3-version }}
        version-file: ${{ steps.detect-versions.outputs.file }}
        version-type: ${{ steps.detect-versions.outputs.version-type }}

    - name: Restore rebar3 cache
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~/.cache/rebar3
        key: ${{ inputs.cache-key-prefix }}-rebar3-${{ runner.os }}-${{ steps.setup-beam.outputs.otp-version }}-${{ hashFiles('rebar.config') }}
        restore-keys: |
          ${{ inputs.cache-key-prefix }}-rebar3-${{ runner.os }}-${{ steps.setup-beam.outputs.otp-version }}-
          ${{ inputs.cache-key-prefix }}-rebar3-${{ runner.os }}-

    - name: Restore build cache
      id: build-cache
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: _build
        key: ${{ inputs.cache-key-prefix }}-build-${{ runner.os }}-${{ steps.setup-beam.outputs.otp-version }}-${{ hashFiles('rebar.lock') }}
        restore-keys: |
          ${{ inputs.cache-key-prefix }}-build-${{ runner.os }}-${{ steps.setup-beam.outputs.otp-version }}-
          ${{ inputs.cache-key-prefix }}-build-${{ runner.os }}-
